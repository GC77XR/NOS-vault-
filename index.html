<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOS_CALIBRATION</title>
    <style>
        body {
            background-color: #000000;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            color: #ffffff;
            text-align: center;
            overflow: hidden;
        }

        h1 { font-size: 14px; letter-spacing: 2px; margin-bottom: 40px; padding: 0 20px; }

        /* The Ritual Circle ⚓ */
        #core-node {
            width: 150px;
            height: 150px;
            border: 2px solid #4B0082; /* Starts Indigo */
            border-radius: 50%;
            background-color: #4B0082;
            transition: background-color 8s ease, border-color 8s ease;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Transmutation to Yellow 🌕 */
        #core-node.yellow {
            background-color: #FFFF00;
            border-color: #FFFF00;
            box-shadow: 0 0 30px #FFFF00;
        }

        #instruction-text {
            margin-top: 40px;
            font-size: 12px;
            line-height: 1.6;
            max-width: 300px;
            text-transform: uppercase;
        }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <h1>WELCOME TO DJ GC77XR AND MICRO HAUS NOS - NEURAL OPERATING SYSTEM CALIBRATION</h1>

    <div id="core-node"></div>
    
    <div id="instruction-text">PLEASE HOLD YOUR TOKEN ON YOUR RIGHT HAND.</div>

    <script>
        const node = document.getElementById('core-node');
        const text = document.getElementById('instruction-text');
        let audioCtx;
        let stage = 1;

        // Stage 1 -> 2: Auto-start the Indigo to Yellow shift
        setTimeout(() => {
            node.classList.add('yellow');
            // Wait for transition to finish
            setTimeout(() => {
                stage = 2;
                text.innerHTML = "TAP ON THE CIRCLE AND PLACE YOUR LEFT HAND ON THE RIGHT HAND TO START THE VESSEL PROTOCOL.<br><br>RESET - IGNITE - INTEGRATE";
            }, 8000); 
        }, 1000);

        // Stage 3: The Tap/Handshake to activate Audio
        node.addEventListener('click', () => {
            if (stage === 2) {
                initializeAudio();
                text.innerHTML = "VESSEL PROTOCOL ACTIVE";
            }
        });

        // iPhone/Desktop Audio Unlock 🔓
        function initializeAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            // Start the 118 BPM Pulse
            const interval = (60 / 118) * 1000;
            setInterval(() => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(110, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
                osc.connect(gain).connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            }, interval);
        }
    </script>
</body>
</html>
