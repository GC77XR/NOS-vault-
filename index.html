<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>V-077XR // NOS VESSEL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="boot-screen">
        <button id="start-btn">START NOS-VESSEL CALIBRATION</button>
    </div>

    <div id="vessel-container" class="hidden">
        <div id="gold-layer"></div>
        
        <div id="media-stage">
            <img id="main-asset" src="8419.png" alt="NOS Logo">
        </div>

        <div id="interface" class="hidden">
            <button id="re-enter">RE-ENTER VESSEL</button>
        </div>

        <div id="data-log">
            <div id="serial-id">SESSION_#000000</div>
            <div id="timestamp">SYNC: --:--:--</div>
            <div id="exit-cmd">> TERMINATE_SESSION</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
