<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOS_VAULT_ARCHITECT</title>
    <style>
        body {
            background-color: #000000;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* Prevents zooming/scrolling during the ritual */
        }

        /* 2-Second Somatic Fade-In */
        .monolith-container {
            opacity: 0;
            animation: fadeIn 2s ease-in forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .monolith-svg {
            width: 70vw;
            max-width: 350px;
        }

        /* The Perfect Cross Segments */
        .segment {
            stroke: #ffffff;
            stroke-width: 6;
            fill: none;
            cursor: pointer;
            transition: stroke 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        /* The Gold Light Burst ✨ */
        .success-glow {
            stroke: #FFD700 !important;
            filter: drop-shadow(0 0 8px #FFD700);
        }

        /* The Red Warning Flicker ⚠️ */
        .warning-flash {
            background-color: #FF0000;
            transition: background-color 0.1s;
        }
    </style>
</head>
<body id="vault-body">

    <div class="monolith-container">
        <svg viewBox="0 0 100 100" class="monolith-svg">
            <line id="p1" x1="50" y1="10" x2="50" y2="30" class="segment" />
            <line id="p2" x1="50" y1="30" x2="50" y2="50" class="segment" />
            <line id="p3" x1="50" y1="50" x2="50" y2="70" class="segment" />
            <line id="p4" x1="50" y1="70" x2="50" y2="90" class="segment" />
            
            <line id="c1" x1="10" y1="40" x2="30" y2="40" class="segment" />
            <line id="c2" x1="30" y1="40" x2="50" y2="40" class="segment" />
            <line id="c3" x1="50" y1="40" x2="70" y2="40" class="segment" />
            <line id="c4" x1="70" y1="40" x2="90" y2="40" class="segment" />
        </svg>
    </div>

</body>
</html>
