<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOS Vault | SATA-CODA</title>
    <style>
        body { margin: 0; background: #000; color: #fff; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        
        #vault-ui {
            position: absolute; top: 20px; width: 100%; text-align: center;
            letter-spacing: 2px; z-index: 5; pointer-events: none;
        }
        
        #core-container {
            position: absolute; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            perspective: 1000px; /* Enables 3D space */
        }

        #core-node {
            width: 140px; height: 140px; background: #fff; border-radius: 50%;
            cursor: pointer; transition: transform 0.2s, opacity 0.3s;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            touch-action: none; /* Prevents scrolling during hold */
        }

        .shard {
            position: absolute; width: 20px; height: 20px; background: #fff; border-radius: 50%;
            transform-style: preserve-3d;
            transition: all 600ms cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .shard.locked {
            background: #00FFFF;
            box-shadow: 0 0 20px #00FFFF;
        }
    </style>
</head>
<body>

    <div id="vault-ui">
        <h2>NOS VAULT</h2>
        <p>DJ GC77XR // MICRO HAUS NOS</p>
    </div>

    <div id="core-container">
        <div id="core-node"></div>
    </div>

    <script>
        const coreNode = document.getElementById('core-node');
        const container = document.getElementById('core-container');
        let audioCtx, gongBuffer, holdTimer;

        async function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            try {
                const res = await fetch('gong.mp3');
                const buf = await res.arrayBuffer();
                gongBuffer = await audioCtx.decodeAudioData(buf);
            } catch (e) { console.error("Gong file missing."); }
        }

        function playGong() {
            if (!gongBuffer) return;
            const src = audioCtx.createBufferSource();
            src.buffer = gongBuffer;
            src.connect(audioCtx.destination);
            src.start(0);
        }

        function triggerShatter() {
            coreNode.style.opacity = '0';
            playGong();

            for (let i = 0; i < 16; i++) {
                const shard = document.createElement('div');
                shard.className = 'shard';
                container.appendChild(shard);

                // Grid Math
                const row = Math.floor(i / 4), col = i % 4;
                const tx = (col - 1.5) * 80, ty = (row - 1.5) * 80;

                setTimeout(() => {
                    // Fly toward user (translateZ) and to grid position
                    shard.style.transform = `translate3d(${tx}px, ${ty}px, 500px)`;
                    shard.classList.add('locked');
                }, 10);
            }
        }

        // Pointer Events for Cross-Device Support
        coreNode.addEventListener('pointerdown', (e) => {
            initAudio();
            coreNode.style.transform = 'scale(0.95)';
            holdTimer = setTimeout(triggerShatter, 5000); // 5s Vanguard Hold
        });

        coreNode.addEventListener('pointerup', () => {
            clearTimeout(holdTimer);
            coreNode.style.transform = 'scale(1)';
        });
    </script>
</body>
</html>
