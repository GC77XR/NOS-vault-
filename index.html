<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NOS - Vessel Protocol</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000000; color: #00ff00; font-family: monospace; }
        #ui-layer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; text-align: center; }
        #calibrationTrigger { background: #bc00ff; color: white; border: 1px solid #bc00ff; padding: 15px 30px; font-size: 1.2rem; cursor: pointer; text-transform: uppercase; letter-spacing: 2px;}
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="ui-layer">
        <p id="systemStatus">VESSEL PROTOCOL READY</p>
        <button id="calibrationTrigger">START CALIBRATION</button>
    </div>

    <script>
        // --- 1. NFC AUTHENTICATION ---
        const calibrationButton = document.getElementById('calibrationTrigger');
        const SECRET_KEY_HEX = "4e4f53204d482037"; // "NOS MH 7"

        calibrationButton.addEventListener('click', async () => {
            document.getElementById('ui-layer').style.display = 'none'; // Hide 2D UI
            
            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                
                ndef.onreading = ({ message }) => {
                    for (const record of message.records) {
                        const textDecoder = new TextDecoder();
                        const data = textDecoder.decode(record.data);
                        
                        if (data.toLowerCase().includes(SECRET_KEY_HEX)) {
                            initXRSpace(); // Trigger 3D Space
                        }
                    }
                };
            } catch (error) {
                console.error("NFC Failed:", error);
            }
        });

        // --- 2. 3D SCENE & CONVERGENCE ---
        let scene, camera, renderer, vaultMesh, coreTrackNode;
        
        function initXRSpace() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Vault Mesh Setup
            vaultMesh = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshBasicMaterial({color: 0xbc00ff, wireframe: true}));
            vaultMesh.position.set(0, 1.5, -2);
            scene.add(vaultMesh); // Skipping stream animation for foundational testing
            
            startVoiceRecognition();
            animate();
        }

        // --- 3. VOICE RECOGNITION ---
        const PROTOCOL_KEY = ["reset", "ignite", "integrate"];
        
        function startVoiceRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return console.log("Voice not supported on this browser.");
            
            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.start();

            recognition.onresult = (event) => {
                const spokenWords = event.results[0][0].transcript.toLowerCase();
                const isAuthorized = PROTOCOL_KEY.every(word => spokenWords.includes(word));
                
                if (isAuthorized) {
                    unlockInfinityVault();
                }
            };
        }

        // --- 4. GAZE TRACKING ---
        let gazeTimer = 0;
        let isMeditationActive = false;
        const raycaster = new THREE.Raycaster();
        const centerVision = new THREE.Vector2(0, 0);

        function unlockInfinityVault() {
            scene.remove(vaultMesh); // Hide Vault
            
            // Show Core Meditation Track Node
            coreTrackNode = new THREE.Mesh(new THREE.OctahedronGeometry(0.2), new THREE.MeshBasicMaterial({color: 0x00ff00, wireframe: true}));
            coreTrackNode.position.set(0, 1.5, -2);
            scene.add(coreTrackNode);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (coreTrackNode && !isMeditationActive) {
                coreTrackNode.rotation.y += 0.01;
                
                raycaster.setFromCamera(centerVision, camera);
                const intersects = raycaster.intersectObject(coreTrackNode);

                if (intersects.length > 0) {
                    gazeTimer += 16; // Approx 16ms per frame
                    coreTrackNode.scale.setScalar(1 + (gazeTimer / 3000) * 0.5);

                    if (gazeTimer >= 3000) {
                        isMeditationActive = true;
                        console.log("> Playing 3:10 Meditation...");
                        // audio.play() goes here
                    }
                } else {
                    gazeTimer = 0;
                    coreTrackNode.scale.setScalar(1);
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
