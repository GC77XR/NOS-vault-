<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOS_VESSEL_PROTOCOL</title>
    <style>
        :root {
            --vanguard: #4B0082;
            --entrepreneur: #00FFFF;
            --alchemist: #FFD700;
            --active-glow: #ffffff;
        }

        body {
            background-color: #000000;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: monospace;
            color: #ffffff;
            user-select: none;
            overflow: hidden;
        }

        #tactical-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 50px;
        }

        .protocol-btn {
            background: none;
            border: 1px solid #ffffff;
            color: #ffffff;
            padding: 12px;
            font-size: 10px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* The Selection Glow 🌟 */
        .protocol-btn.active {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 0 15px var(--active-glow), 0 0 30px var(--active-glow);
        }

        #core-node {
            width: 140px;
            height: 140px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            transition: background-color 5s linear;
        }

        #core-node.holding {
            background-color: var(--active-glow);
        }

        #instruction-text {
            margin-top: 30px;
            font-size: 12px;
            text-align: center;
            max-width: 280px;
            line-height: 1.6;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="tactical-grid">
        <button class="protocol-btn" id="btn-vanguard" onclick="setProtocol('vanguard')">VANGUARD</button>
        <button class="protocol-btn" id="btn-entrepreneur" onclick="setProtocol('entrepreneur')">ENTREPRENEUR</button>
        <button class="protocol-btn" id="btn-alchemist" onclick="setProtocol('alchemist')">ALCHEMIST</button>
    </div>

    <div id="core-node"></div>
    <div id="instruction-text">INITIALIZE SYSTEM</div>

    <script>
        const protocols = {
            vanguard: { color: '#4B0082', bpm: 45, type: 'sine', cmd: 'OWN THE WEIGHT.<br>RIGHT HAND GRIP. LEFT HAND COVER.' },
            entrepreneur: { color: '#00FFFF', bpm: 140, type: 'square', cmd: 'CUT THE STATIC.<br>RIGHT HAND GRIP. LEFT HAND COVER.' },
            alchemist: { color: '#FFD700', bpm: 118, type: 'triangle', cmd: 'UNIFIED STATE.<br>RIGHT HAND GRIP. LEFT HAND COVER.' }
        };

        let current = null;
        let holdTimer, audioCtx, pulseInterval;
        let isActive = false;

        function setProtocol(id) {
            current = protocols[id];
            document.querySelectorAll('.protocol-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + id).classList.add('active');
            document.documentElement.style.setProperty('--active-glow', current.color);
            document.getElementById('instruction-text').innerHTML = current.cmd;
            stopAll();
        }

        function playPulse() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const ms = (60 / current.bpm) * 1000;
            pulseInterval = setInterval(() => {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = current.type;
                osc.frequency.setValueAtTime(id === 'vanguard' ? 55 : 220, audioCtx.currentTime);
                g.gain.setValueAtTime(0.3, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                osc.connect(g).connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            }, ms);
        }

        function stopAll() {
            clearInterval(pulseInterval);
            isActive = false;
            document.getElementById('core-node').classList.remove('holding');
            clearTimeout(holdTimer);
        }

        document.getElementById('core-node').addEventListener('touchstart', (e) => {
            if (!current || isActive) return;
            e.preventDefault();
            e.target.classList.add('holding');
            holdTimer = setTimeout(() => {
                isActive = true;
                playPulse();
                document.getElementById('instruction-text').innerHTML = "CALIBRATION ACTIVE";
            }, 5000);
        });

        document.getElementById('core-node').addEventListener('touchend', () => { if (!isActive) stopAll(); });

        let last = 0;
        document.body.addEventListener('touchend', () => {
            const now = Date.now();
            if (now - last < 500 && isActive) {
                document.getElementById('instruction-text').innerHTML = "CALIBRATION COMPLETE.<br>OPEN YOUR HANDS.";
                stopAll();
            }
            last = now;
        });
    </script>
</body>
</html>
