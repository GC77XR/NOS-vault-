<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOS_ALPHA_ARCHITECT</title>
    <style>
        /* The Vault Environment */
        body {
            background-color: #000000;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: monospace;
        }

        /* The 2-Second Somatic Fade-In */
        .monolith-container {
            opacity: 0;
            animation: fadeIn 2s ease-in forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* The Perfect Cross Geometry */
        .monolith-svg {
            width: 80vw;
            max-width: 400px;
        }

        .segment {
            stroke: #ffffff;
            stroke-width: 4;
            fill: none;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="monolith-container">
        <svg viewBox="0 0 100 100" class="monolith-svg">
            <line x1="50" y1="10" x2="50" y2="90" class="segment" id="pillar" />
            <line x1="10" y1="40" x2="90" y2="40" class="segment" id="crossbar" />
        </svg>
    </div>

</body>
</html>
<script>
   let score = 0;
    const segments = ['p1', 'p2', 'p3', 'p4', 'c1', 'c2', 'c3', 'c4'];
    const body = document.getElementById('vault-body');

    // Logic for Vertical Symmetry ⚖️
    const mirrorMap = {
        'p1': 'p4', 'p4': 'p1', // Top mirrors Bottom
        'p2': 'p3', 'p3': 'p2', // Middle-top mirrors Middle-bottom
        'c1': 'c4', 'c4': 'c1', // Far-left mirrors Far-right
        'c2': 'c3', 'c3': 'c2' // Inner-left mirrors Inner-right
    };

    function startChallenge() {
        const randomId = segments[Math.floor(Math.random() * segments.length)];
        const target = document.getElementById(randomId);
        target.style.stroke = '#555'; // Highlight the challenge segment in Grey
        
        target.onclick = null; // Disable clicking the target itself
        
        // Listen for the Mirror Tap
        const mirrorId = mirrorMap[randomId];
        document.getElementById(mirrorId).onclick = function() {
            this.classList.add('success-glow'); // Trigger Gold Light Burst ✨
            score++;
            
            setTimeout(() => {
                this.classList.remove('success-glow');
                target.style.stroke = '#ffffff'; // Reset target
                if (score < 3) {
                    startChallenge(); // Next match
                } else {
                    alert("PROTOCOL COMPLETE: ARCHITECT VERIFIED 📐");
                    score = 0; // Reset for next session
                }
            }, 600);
        };
    }

    // Start after the 2-second Fade-In
    setTimeout(startChallenge, 2500);
</script>
