<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-077XR // MASTER VESSEL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="boot-screen">
        <div id="boot-menu">
            <button id="btn-nos">MICRO HAUS - NEURAL OPERATING SYSTEM (NOS) VESSEL</button>
            <button id="btn-sonic">DJ GC77XR - SONIC CALIBRATION</button>
        </div>
    </div>

    <div id="vessel" class="hidden">
        <div id="vessel-container">
            
            <div id="media-stage">
                <img id="asset-nos" src="8419.png" class="hidden">
                
                <div id="asset-sonic" class="octahedron-wrapper hidden">
                    <div class="octahedron">
                        <div class="side t-front"></div>
                        <div class="side t-back"></div>
                        <div class="side t-left"></div>
                        <div class="side t-right"></div>
                        <div class="side b-front"></div>
                        <div class="side b-back"></div>
                        <div class="side b-left"></div>
                        <div class="side b-right"></div>
                    </div>
                </div>
            </div>

            <div id="data-log">
                <p id="timestamp">SYNC: 00:00:00</p>
                <p id="status">INITIALIZING CALIBRATION...</p>
            </div>
            
            <button id="re-enter-btn" class="hidden">RE-ENTER</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
